name: Daily data update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 03 * * *" # daily 03:15 UTC

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Clean generated data folders
        run: |
          rm -rf data/events_by_day || true
          mkdir -p data/events_by_day

      # (Optional) If you still build history from CSV, keep your existing step here:
      # - name: Build history/leagues
      #   run: node scripts/build-data.js

      - name: Build events by day (TheSportsDB)
        env:
          SPORTSDB_V1_KEY: ${{ secrets.SPORTSDB_V1_KEY }}
        run: node scripts/sportsdb-build-events-by-day.js

      - name: Commit & push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/events_by_day

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily events by day update (TheSportsDB)"
          git push
