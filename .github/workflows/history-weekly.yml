name: Weekly history update (CSV/XLSX)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1"  # Monday 06:15 UTC

permissions:
  contents: write

jobs:
  history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install
        # npm ci requires package-lock.json; if you don't have it yet, use npm install
        # We'll fix below.

      - name: Build history + team stats
        run: node scripts/build-history-from-sources.js

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/history data/stats
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Weekly history update"
          git push
