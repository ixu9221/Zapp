<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coverage Browser (Tools)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">Coverage Browser</div>
      <div class="subtitle">TheSportsDB eventsday → validate data coverage</div>
    </div>

    <div class="controls">
      <div class="control">
        <label for="daySel">Day</label>
        <select id="daySel"></select>
      </div>

      <div class="control">
        <label for="filterSel">Filter</label>
        <select id="filterSel">
          <option value="upcoming" selected>Upcoming</option>
          <option value="finished">Finished</option>
          <option value="all">All</option>
        </select>
      </div>

      <div class="control">
        <label for="leagueSel">League</label>
        <select id="leagueSel"></select>
      </div>

      <div class="control">
        <label>&nbsp;</label>
        <button id="reloadBtn">Reload</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </section>

    <section class="card">
      <div class="card-title">Day Summary</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="k">Total events</div>
          <div class="v" id="totalEvents">—</div>
        </div>
        <div class="summary-item">
          <div class="k">Unique leagues</div>
          <div class="v" id="uniqueLeagues">—</div>
        </div>
        <div class="summary-item">
          <div class="k">Shown events</div>
          <div class="v" id="shownEvents">—</div>
        </div>
      </div>
      <div class="hint" id="hint"></div>
    </section>

    <section class="card">
      <div class="card-title">Matches</div>
      <div id="matches" class="matches"></div>
    </section>
  </main>

  <footer class="footer">
    Data source: <code>/data/events_by_day/YYYY-MM-DD.json</code> (generated by GitHub Actions)
  </footer>

  <script src="./app.js"></script>
</body>
</html>
